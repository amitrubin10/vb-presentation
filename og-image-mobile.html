<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 630px;
  font-family: 'Heebo', sans-serif;
  color: #fff;
  background:
    linear-gradient(135deg, rgba(11,16,32,0.45) 0%, rgba(11,16,32,0.85) 100%),
    url('screenshots/14.png') center center / cover no-repeat,
    #0b1020;
  overflow: hidden;
  position: relative;
}

/* Decorative glow blobs — fill the corners */
body::before {
  content: '';
  position: absolute;
  top: -200px;
  right: -200px;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(77,208,225,0.35) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: absolute;
  bottom: -250px;
  left: -250px;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(124,167,255,0.25) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 60px;
  direction: ltr;
}
.wrap > * { direction: rtl; }

/* === Phone mockup (LEFT side, larger) === */
.phone {
  width: 290px;
  height: 580px;
  background: #0b1020;
  border: 9px solid #2a374f;
  border-radius: 50px;
  flex-shrink: 0;
  position: relative;
  box-shadow:
    0 0 120px rgba(77,208,225,0.45),
    0 40px 100px rgba(0,0,0,0.7),
    inset 0 2px 0 rgba(255,255,255,0.06);
  padding: 14px;
  transform: rotate(-3deg);
}
.phone::after {
  content: '';
  position: absolute;
  top: 22px;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  height: 26px;
  background: #000;
  border-radius: 100px;
  z-index: 5;
}
.phone-screen {
  width: 100%;
  height: 100%;
  background:
    radial-gradient(ellipse at top, rgba(124,167,255,0.18), transparent 50%),
    linear-gradient(180deg, #111827 0%, #0b1020 100%);
  border-radius: 38px;
  padding: 70px 16px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  overflow: hidden;
}
.phone-logo {
  width: 72px;
  height: 72px;
  background: rgba(13, 100, 130, 0.30);
  border: 2px solid rgba(77, 208, 225, 0.55);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 32px;
  color: #fff;
  letter-spacing: -1px;
  box-shadow:
    0 0 35px rgba(77, 208, 225, 0.50),
    inset 0 1px 0 rgba(255, 255, 255, 0.15);
  margin-bottom: 16px;
}
.phone-title {
  font-size: 30px;
  font-weight: 900;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
  color: #fff;
}
.phone-tagline {
  font-size: 13px;
  color: #4dd0e1;
  font-weight: 600;
  margin-bottom: 22px;
}
.phone-cards {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.phone-card {
  background: rgba(36,48,73,0.92);
  border: 1px solid rgba(77,208,225,0.22);
  border-radius: 13px;
  padding: 11px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.phone-card .ico {
  width: 32px;
  height: 32px;
  border-radius: 9px;
  background: rgba(124,167,255,0.20);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.phone-card .lbl {
  font-size: 12px;
  font-weight: 700;
  color: #e8ecf4;
  text-align: right;
  flex: 1;
}
.phone-card.green .ico { background: rgba(52,211,153,0.22); }
.phone-card.purple .ico { background: rgba(192,132,252,0.22); }
.phone-card.warning .ico { background: rgba(245,158,11,0.22); }

/* === Right text content === */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  text-align: right;
  padding: 0 40px 0 60px;
  max-width: 760px;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(77,208,225,0.18);
  border: 2px solid rgba(77,208,225,0.55);
  padding: 11px 24px;
  border-radius: 100px;
  font-size: 22px;
  font-weight: 700;
  color: #4dd0e1;
  margin-bottom: 28px;
  box-shadow: 0 0 40px rgba(77,208,225,0.25);
  backdrop-filter: blur(8px);
}
.title {
  font-size: 92px;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 0.95;
  background: linear-gradient(135deg, #fff 0%, #b9c2d6 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 26px;
}
.tagline {
  font-size: 34px;
  color: #b9c2d6;
  font-weight: 600;
  margin-bottom: 36px;
  line-height: 1.3;
}
.cta-line {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.01em;
  display: flex;
  align-items: center;
  gap: 14px;
}
.cta-line .arrow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 42px;
  background: rgba(77,208,225,0.22);
  border: 2px solid rgba(77,208,225,0.55);
  border-radius: 50%;
  font-size: 18px;
  color: #4dd0e1;
}
.cta-line .accent {
  color: #4dd0e1;
}
</style>
</head>
<body>
  <div class="wrap">
    <!-- Phone mockup (LEFT due to LTR wrap) -->
    <div class="phone">
      <div class="phone-screen">
        <div class="phone-logo">VB</div>
        <div class="phone-title">ועד בית</div>
        <div class="phone-tagline">הפתרון החכם</div>
        <div class="phone-cards">
          <div class="phone-card green">
            <div class="ico">💰</div>
            <div class="lbl">גבייה אוטומטית</div>
          </div>
          <div class="phone-card">
            <div class="ico">📊</div>
            <div class="lbl">דוחות חיים</div>
          </div>
          <div class="phone-card purple">
            <div class="ico">📤</div>
            <div class="lbl">מעקב ספקים</div>
          </div>
          <div class="phone-card warning">
            <div class="ico">🔒</div>
            <div class="lbl">פרטיות מלאה</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right text content -->
    <div class="content">
      <div class="badge">📱 מותאם לנייד</div>
      <div class="title">ועד בית<br>בכף היד</div>
      <div class="tagline">פחות עבודה.<br>יותר שליטה.</div>
      <div class="cta-line"><span class="arrow">←</span><span><span class="accent">דקה וחצי</span> · כל המידע</span></div>
    </div>
  </div>
</body>
</html>
