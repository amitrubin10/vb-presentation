<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 630px;
  font-family: 'Heebo', sans-serif;
  color: #fff;
  background:
    linear-gradient(135deg, rgba(11,16,32,0.55) 0%, rgba(11,16,32,0.92) 100%),
    url('screenshots/1.png') center center / cover no-repeat,
    #0b1020;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px;
}

/* Glow accents */
body::before {
  content: '';
  position: absolute;
  top: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(124,167,255,0.25) 0%, transparent 60%);
  pointer-events: none;
}
body::after {
  content: '';
  position: absolute;
  bottom: -200px;
  left: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(192,132,252,0.18) 0%, transparent 60%);
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo {
  width: 160px;
  height: 160px;
  background: rgba(13, 100, 130, 0.20);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 2px solid rgba(77, 208, 225, 0.50);
  border-radius: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 72px;
  color: rgba(255,255,255,0.96);
  letter-spacing: -2px;
  box-shadow:
    0 0 90px rgba(77, 208, 225, 0.40),
    0 24px 60px rgba(0, 0, 0, 0.55),
    inset 0 1px 0 rgba(255, 255, 255, 0.12);
  margin-bottom: 36px;
}

.title {
  font-size: 96px;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1;
  background: linear-gradient(135deg, #fff 0%, #b9c2d6 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 24px;
}

.tagline {
  font-size: 36px;
  color: #4dd0e1;
  font-weight: 600;
  letter-spacing: 0.01em;
  margin-bottom: 36px;
}

.bottom {
  position: absolute;
  bottom: 36px;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 22px;
  z-index: 1;
}

.pill {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.18);
  padding: 12px 22px;
  border-radius: 100px;
  font-size: 20px;
  font-weight: 600;
  color: rgba(255,255,255,0.92);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
</style>
</head>
<body>
  <div class="content">
    <div class="logo">VB</div>
    <div class="title">ועד בית</div>
    <div class="tagline">הפתרון החכם לניהול הבניין</div>
  </div>
  <div class="bottom">
    <div class="pill">💰 גבייה אוטומטית</div>
    <div class="pill">📊 דוחות חיים</div>
    <div class="pill">🔒 פרטיות מלאה</div>
  </div>
</body>
</html>
